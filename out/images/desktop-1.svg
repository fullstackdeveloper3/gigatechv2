<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="rgb1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Gaming tower case -->
  <rect x="230" y="45" width="100" height="200" rx="8" fill="#0c1426" stroke="url(#rgb1)" stroke-width="2"/>
  <!-- RGB strips -->
  <rect x="232" y="60" width="2" height="170" fill="url(#rgb1)" opacity="0.8"/>
  <rect x="328" y="60" width="2" height="170" fill="url(#rgb1)" opacity="0.8"/>
  <!-- Case front panel -->
  <rect x="250" y="60" width="60" height="30" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Fan grille -->
  <circle cx="280" cy="75" r="10" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="280" cy="75" r="6" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <!-- Power button -->
  <circle cx="280" cy="105" r="5" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <!-- Vents -->
  <rect x="255" y="140" width="50" height="2" rx="1" fill="rgba(255,255,255,0.04)"/>
  <rect x="255" y="148" width="50" height="2" rx="1" fill="rgba(255,255,255,0.04)"/>
  <rect x="255" y="156" width="50" height="2" rx="1" fill="rgba(255,255,255,0.04)"/>
  <!-- Monitor -->
  <rect x="60" y="55" width="150" height="100" rx="6" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <rect x="67" y="61" width="136" height="87" rx="3" fill="#0f172a"/>
  <!-- Screen content -->
  <rect x="80" y="75" width="50" height="5" rx="2.5" fill="#06b6d4" opacity="0.4"/>
  <rect x="80" y="88" width="108" height="4" rx="2" fill="#ffffff" opacity="0.1"/>
  <rect x="80" y="98" width="90" height="4" rx="2" fill="#ffffff" opacity="0.07"/>
  <!-- Monitor stand -->
  <rect x="120" y="155" width="30" height="20" fill="#0c1426"/>
  <rect x="100" y="172" width="70" height="6" rx="3" fill="#0c1426" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- RGB glow -->
  <circle cx="280" cy="145" r="50" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="280" cy="145" r="30" fill="#06b6d4" opacity="0.04"/>
</svg>
