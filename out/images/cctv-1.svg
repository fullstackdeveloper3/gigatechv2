    <circle cx="20" cy="30" r="12" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <circle cx="20" cy="30" r="6" fill="#06b6d4" opacity="0.15"/>
    <circle cx="20" cy="30" r="2" fill="#06b6d4" opacity="0.4"/>
    <rect x="50" y="20" width="20" height="20" rx="3" fill="#0c1426" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>
