<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Outdoor bullet camera -->
  <!-- Mount bracket -->
  <rect x="150" y="50" width="100" height="15" rx="4" fill="#0c1426" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="185" y="65" width="30" height="25" rx="4" fill="#0c1426" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Camera body -->
  <rect x="120" y="90" width="160" height="65" rx="10" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Sun shield -->
  <path d="M115 85 L285 85 L280 95 L120 95 Z" fill="#0c1426" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Lens -->
  <circle cx="175" cy="122" r="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="175" cy="122" r="16" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <circle cx="175" cy="122" r="9" fill="#06b6d4" opacity="0.12"/>
  <circle cx="175" cy="122" r="4" fill="#06b6d4" opacity="0.3"/>
  <!-- IR array -->
  <rect x="210" y="105" width="55" height="35" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <circle cx="225" cy="116" r="3" fill="#ff4444" opacity="0.15"/>
  <circle cx="237" cy="116" r="3" fill="#ff4444" opacity="0.15"/>
  <circle cx="249" cy="116" r="3" fill="#ff4444" opacity="0.15"/>
  <circle cx="225" cy="130" r="3" fill="#ff4444" opacity="0.15"/>
  <circle cx="237" cy="130" r="3" fill="#ff4444" opacity="0.15"/>
  <circle cx="249" cy="130" r="3" fill="#ff4444" opacity="0.15"/>
  <!-- IP67 badge -->
  <rect x="155" y="180" width="90" height="24" rx="12" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="200" y="196" font-family="system-ui" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.6">IP67</text>
