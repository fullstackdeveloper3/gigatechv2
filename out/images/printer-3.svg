<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Large business color laser -->
  <rect x="80" y="80" width="240" height="140" rx="8" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- ADF top section -->
  <rect x="85" y="45" width="230" height="40" rx="6" fill="#0c1426" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Touchscreen panel -->
  <rect x="240" y="95" width="65" height="50" rx="5" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="247" y="102" width="51" height="28" rx="3" fill="rgba(6,182,212,0.05)"/>
  <rect x="252" y="108" width="35" height="4" rx="2" fill="#06b6d4" opacity="0.35"/>
  <rect x="252" y="116" width="25" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <!-- Touch buttons -->
  <rect x="250" y="135" width="20" height="6" rx="3" fill="#06b6d4" opacity="0.15"/>
  <rect x="275" y="135" width="20" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  <!-- Paper output -->
  <rect x="110" y="90" width="115" height="10" rx="2" fill="rgba(255,255,255,0.03)"/>
  <!-- Color toner indicators -->
  <g transform="translate(110, 115)">
    <rect x="0" y="0" width="90" height="12" rx="3" fill="rgba(255,255,255,0.02)"/>
    <rect x="5" y="3" width="18" height="6" rx="2" fill="#06b6d4" opacity="0.2"/>
    <rect x="27" y="3" width="18" height="6" rx="2" fill="#ec4899" opacity="0.15"/>
    <rect x="49" y="3" width="18" height="6" rx="2" fill="#eab308" opacity="0.15"/>
    <rect x="71" y="3" width="14" height="6" rx="2" fill="#1e1e1e" opacity="0.2"/>
  </g>
  <!-- Duplex indicator -->
  <rect x="110" y="145" width="80" height="18" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <text x="150" y="158" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">AUTO DUPLEX</text>
  <!-- Paper trays (stacked) -->
  <rect x="100" y="205" width="200" height="15" rx="3" fill="#0c1426" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="105" y="218" width="190" height="12" rx="3" fill="#0c1426" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Network indicators -->
  <g transform="translate(200, 145)">
    <rect x="0" y="0" width="28" height="18" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    <path d="M5 12 Q14 4 23 12" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <path d="M9 9 Q14 5 19 9" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <circle cx="14" cy="13" r="1.5" fill="#06b6d4" opacity="0.5"/>
  </g>
</svg>
