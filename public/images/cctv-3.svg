<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Indoor dome camera -->
  <ellipse cx="200" cy="155" rx="60" ry="30" fill="#0c1426" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <ellipse cx="200" cy="120" rx="60" ry="50" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Dome glass -->
  <ellipse cx="200" cy="110" rx="45" ry="35" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Lens -->
  <circle cx="200" cy="115" r="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="115" r="10" fill="#06b6d4" opacity="0.1"/>
  <circle cx="200" cy="115" r="5" fill="#06b6d4" opacity="0.25"/>
  <circle cx="200" cy="115" r="2" fill="#06b6d4" opacity="0.5"/>
  <!-- IR LEDs ring -->
  <circle cx="180" cy="100" r="2" fill="#ff4444" opacity="0.2"/>
  <circle cx="190" cy="95" r="2" fill="#ff4444" opacity="0.2"/>
  <circle cx="200" cy="93" r="2" fill="#ff4444" opacity="0.2"/>
  <circle cx="210" cy="95" r="2" fill="#ff4444" opacity="0.2"/>
  <circle cx="220" cy="100" r="2" fill="#ff4444" opacity="0.2"/>
  <!-- WiFi signal -->
  <g transform="translate(270, 90)">
    <path d="M0 20 Q15 5 30 20" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
    <path d="M5 16 Q15 8 25 16" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <path d="M10 12 Q15 8 20 12" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <circle cx="15" cy="22" r="2" fill="#06b6d4" opacity="0.6"/>
  </g>
  <!-- Phone with app -->
  <rect x="100" y="190" width="45" height="75" rx="8" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <rect x="106" y="200" width="33" height="50" rx="3" fill="#0f172a"/>
  <!-- App screen -->
  <rect x="110" y="205" width="25" height="18" rx="2" fill="#06b6d4" opacity="0.08"/>
  <circle cx="122" cy="214" r="4" fill="#06b6d4" opacity="0.15"/>
  <rect x="110" y="228" width="25" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="110" y="235" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.04)"/>
  <!-- Connection arc -->
  <path d="M145 220 Q200 180 200 155" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
