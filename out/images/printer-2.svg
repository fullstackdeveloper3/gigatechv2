<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Inkjet printer body -->
  <rect x="100" y="100" width="200" height="100" rx="8" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Top cover -->
  <rect x="105" y="80" width="190" height="25" rx="5" fill="#0c1426" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Paper output slot -->
  <rect x="130" y="88" width="100" height="4" rx="2" fill="rgba(255,255,255,0.03)"/>
  <!-- Color photo coming out -->
  <rect x="150" y="68" width="70" height="25" rx="2" fill="#f1f5f9" opacity="0.08"/>
  <rect x="155" y="72" width="25" height="16" rx="1" fill="#06b6d4" opacity="0.08"/>
  <rect x="183" y="72" width="25" height="16" rx="1" fill="#8b5cf6" opacity="0.06"/>
  <!-- Control panel -->
  <rect x="230" y="110" width="55" height="30" rx="4" fill="#0f172a" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="236" y="116" width="43" height="12" rx="2" fill="rgba(6,182,212,0.04)"/>
  <circle cx="244" cy="134" r="2.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="254" cy="134" r="2.5" fill="rgba(255,255,255,0.06)"/>
  <!-- Ink tank indicators -->
  <g transform="translate(115, 120)">
    <rect x="0" y="0" width="8" height="30" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <rect x="0" y="10" width="8" height="20" rx="2" fill="#06b6d4" opacity="0.2"/>
    <rect x="14" y="0" width="8" height="30" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <rect x="14" y="8" width="8" height="22" rx="2" fill="#ec4899" opacity="0.15"/>
    <rect x="28" y="0" width="8" height="30" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <rect x="28" y="5" width="8" height="25" rx="2" fill="#eab308" opacity="0.15"/>
    <rect x="42" y="0" width="8" height="30" rx="2" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <rect x="42" y="12" width="8" height="18" rx="2" fill="#1e1e1e" opacity="0.2"/>
  </g>
  <!-- Paper tray -->
  <rect x="120" y="185" width="160" height="15" rx="3" fill="#0c1426" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="200" y="165" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">INK TANK</text>
</svg>
