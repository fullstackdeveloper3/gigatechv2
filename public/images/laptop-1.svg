<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g1)"/>
  <!-- Laptop screen -->
  <rect x="90" y="50" width="220" height="145" rx="8" fill="#0c1426" stroke="url(#accent1)" stroke-width="2"/>
  <rect x="100" y="58" width="200" height="129" rx="4" fill="#0f172a"/>
  <!-- Screen glow content -->
  <rect x="115" y="75" width="80" height="8" rx="4" fill="#06b6d4" opacity="0.6"/>
  <rect x="115" y="92" width="120" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="115" y="105" width="100" height="6" rx="3" fill="#ffffff" opacity="0.1"/>
  <rect x="115" y="125" width="60" height="24" rx="6" fill="#06b6d4" opacity="0.2"/>
  <!-- Gaming accent lines -->
  <line x1="260" y1="75" x2="285" y2="75" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="85" x2="280" y2="85" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
  <line x1="260" y1="95" x2="275" y2="95" stroke="#06b6d4" stroke-width="2" opacity="0.2"/>
  <!-- Laptop base -->
  <path d="M70 200 L90 195 L310 195 L330 200 L340 210 L60 210 Z" fill="#0c1426" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Keyboard area hint -->
  <rect x="130" y="198" width="140" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <!-- RTX badge -->
  <rect x="260" y="215" width="50" height="16" rx="3" fill="#06b6d4" opacity="0.15"/>
  <text x="285" y="226" font-family="system-ui" font-size="8" fill="#06b6d4" text-anchor="middle" opacity="0.7">RTX</text>
  <!-- Ambient glow -->
  <circle cx="200" cy="130" r="80" fill="#06b6d4" opacity="0.03"/>
</svg>
