  <line x1="310" y1="60" x2="305" y2="80" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <line x1="325" y1="50" x2="320" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.1"/>
  <line x1="340" y1="65" x2="335" y2="85" stroke="#06b6d4" stroke-width="1" opacity="0.12"/>
  <!-- Night vision glow -->
  <circle cx="175" cy="122" r="50" fill="#06b6d4" opacity="0.03"/>
